{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="glass-effect p-4">
            <h2><i class="fas fa-user-plus"></i> Create Memorial Persona</h2>
            <p class="text-muted">Create an AI representation of your loved one</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                    <div class="form-text">The name of your loved one</div>
                </div>
                
                <div class="mb-3">
                    <label for="relationship" class="form-label">Relationship</label>
                    <select class="form-control" id="relationship" name="relationship" required>
                        <option value="">Select relationship...</option>
                        <option value="Mother">Mother</option>
                        <option value="Father">Father</option>
                        <option value="Spouse">Spouse</option>
                        <option value="Partner">Partner</option>
                        <option value="Sibling">Sibling</option>
                        <option value="Child">Child</option>
                        <option value="Grandparent">Grandparent</option>
                        <option value="Friend">Friend</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-arrow-right"></i> Create & Add Data
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
